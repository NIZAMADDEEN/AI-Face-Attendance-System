{% extends "base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Register New User</h1>
</div>

<div class="row">
    <!-- Form Box -->
    <div class="col-md-5">
        <div class="card p-4">
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Registration ID (Student/Teacher ID)</label>
                    <input type="text" class="form-control" id="student_id" placeholder="e.g. S123 or T456" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3" {% if not is_admin %}style="display: none;"{% endif %}>
                    <label class="form-label">Role</label>
                    <select class="form-select" id="role" required onchange="toggleStudentFields()">
                        {% if is_admin %}
                        <option value="Teacher" selected>Teacher</option>
                        <option value="Admin">Admin</option>
                        {% else %}
                        <option value="Student" selected>Student</option>
                        {% endif %}
                    </select>
                </div>
                <!-- Student Specific Fields [NEW] -->
                <div id="studentFields" class="mb-3">
                    <label class="form-label">Assign to Class</label>
                    <select class="form-select" id="class_id">
                        <option value="" selected disabled>Choose Class...</option>
                        {% for cls in classes %}
                        <option value="{{ cls.id }}">{{ cls.class_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                {% if is_admin %}
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="adminOverride">
                    <label class="form-check-label text-warning" for="adminOverride"><i class="fas fa-exclamation-triangle"></i> Admin Override: Skip Webcam (Database Only)</label>
                </div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">1. Save Details</button>
            </form>

            <script>
                function toggleStudentFields() {
                    const role = document.getElementById('role').value;
                    const studentFields = document.getElementById('studentFields');
                    const classIdInput = document.getElementById('class_id');
                    
                    if (role === 'Student') {
                        studentFields.style.display = 'block';
                        classIdInput.required = true;
                    } else {
                        studentFields.style.display = 'none';
                        classIdInput.required = false;
                    }
                }
                // Initialize
                window.onload = toggleStudentFields;
            </script>
            <div id="statusMsg" class="mt-3 text-center"></div>
        </div>
    </div>

    <!-- Webcam Capture Box -->
    <div class="col-md-7">
        <div class="card p-4">
            <h4>Capture Face Dataset</h4>
            <p class="text-muted">Register details first, then capture at least 10 photos.</p>
            <video id="video" width="100%" autoplay style="border-radius: 8px; background: #000;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="mt-3 d-flex justify-content-between">
                <button id="captureBtn" class="btn btn-success" disabled>
                    <i class="fas fa-camera"></i> Capture Face (<span id="count">0</span>/10)
                </button>
                <button id="trainBtn" class="btn btn-primary" disabled>
                    <i class="fas fa-check-circle"></i> 3. Finalize Registration
                </button>
            </div>
            <div id="captureStatus" class="mt-2 text-center text-info"></div>
        </div>
    </div>
</div>

<script>
    const studentIdInput = document.getElementById('student_id');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const roleInput = document.getElementById('role');
    const passwordInput = document.getElementById('password');
    const registerForm = document.getElementById('registerForm');
    const statusMsg = document.getElementById('statusMsg');
    
    // Video elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const captureBtn = document.getElementById('captureBtn');
    const trainBtn = document.getElementById('trainBtn');
    const countSpan = document.getElementById('count');
    const captureStatus = document.getElementById('captureStatus');

    let currentStudentId = null;
    let captureCount = 0;
    const TARGET_COUNT = 10;

    let cameraStream = null;

    // Camera Management
    async function startWebcam() {
        if(cameraStream) return;
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = cameraStream;
            video.onloadedmetadata = () => {
                console.log("Video metadata loaded:", video.videoWidth, video.videoHeight);
            };
        } catch (err) {
            console.error("Webcam error:", err); 
            statusMsg.innerHTML = `<span class="text-danger">Webcam error: ${err.message}</span>`;
        }
    }

    function stopWebcam() {
        if(cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
            video.srcObject = null;
        }
    }

    // Step 1: Register
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = registerForm.querySelector('button[type="submit"]');
        const data = {
            student_id: studentIdInput.value,
            name: nameInput.value,
            email: emailInput.value,
            role: roleInput.value,
            password: passwordInput.value,
            class_id: document.getElementById('class_id').value // New
        };

        statusMsg.innerHTML = `<span class="text-info"><i class="fas fa-spinner fa-spin"></i> Checking registration...</span>`;
        submitBtn.disabled = true;

        fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(async (res) => {
            if(res.success) {
                const adminOverrideCheckbox = document.getElementById('adminOverride');
                const isOverride = adminOverrideCheckbox ? adminOverrideCheckbox.checked : false;
                
                if(isOverride) {
                    statusMsg.innerHTML = `<span class="text-info"><i class="fas fa-spinner fa-spin"></i> Bypassing webcam. Saving to database...</span>`;
                    fetch('/api/finalize_registration', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    }).then(r => r.json()).then(finalRes => {
                        if(finalRes.success) {
                            statusMsg.innerHTML = `<span class="text-success"><i class="fas fa-check-circle"></i> User successfully registered!</span>`;
                            registerForm.reset();
                            submitBtn.disabled = false;
                        } else {
                            statusMsg.innerHTML = `<span class="text-danger">DB Error: ${finalRes.message}</span>`;
                            submitBtn.disabled = false;
                        }
                    }).catch(err => {
                        statusMsg.innerHTML = `<span class="text-danger">Finalization error: ${err.message}</span>`;
                        submitBtn.disabled = false;
                    });
                } else {
                    statusMsg.innerHTML = `<span class="text-success">${res.message}</span>`;
                    currentStudentId = data.student_id;
                    
                    if(data.role === 'Student') {
                        // Start Webcam for students
                        await startWebcam();
                        captureBtn.disabled = false;
                    } else {
                        // Non-students (Admin, Teacher) finalize directly
                        trainBtn.innerText = "3. Complete Registration";
                        trainBtn.disabled = false;
                    }
                    studentIdInput.disabled = true;
                    nameInput.disabled = true;
                    emailInput.disabled = true;
                    if (roleInput) roleInput.disabled = true;
                    if (adminOverrideCheckbox) adminOverrideCheckbox.disabled = true;
                    submitBtn.disabled = true;
                }
            } else {
                statusMsg.innerHTML = `<span class="text-danger">${res.message}</span>`;
                submitBtn.disabled = false;
            }
        }).catch(err => {
            statusMsg.innerHTML = `<span class="text-danger">Network error: ${err.message}</span>`;
            submitBtn.disabled = false;
        });
    });

    // Step 2: Capture Images
    captureBtn.addEventListener('click', () => {
        if(!currentStudentId) return;
        
        if (video.videoWidth === 0 || video.videoHeight === 0) {
            captureStatus.innerHTML = `<span class="text-warning">Waiting for video stream dimensions...</span>`;
            return;
        }

        // Immediate feedback
        const originalText = captureBtn.innerHTML;
        captureBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Capturing...`;
        captureBtn.disabled = true;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/jpeg');
        
        fetch('/api/save_image', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                student_id: currentStudentId,
                image: dataURL
            })
        })
        .then(res => res.json())
        .then(data => {
            captureBtn.innerHTML = originalText;
            captureBtn.disabled = false;
            
            // Re-fetch countSpan because innerHTML replacement might have detached the old one
            const currentCountSpan = document.getElementById('count');
            
            if(data.success) {
                captureCount++;
                if (currentCountSpan) currentCountSpan.innerText = captureCount;
                captureStatus.innerHTML = `<span class="text-success">${data.message}</span>`;
                if(captureCount >= TARGET_COUNT) {
                    trainBtn.disabled = false;
                    captureBtn.disabled = true;
                    captureBtn.innerHTML = `<i class="fas fa-check"></i> Finished (10/10)`;
                    captureStatus.innerText = "Sufficient dataset collected. Click Finalize.";
                }
            } else {
                captureStatus.innerHTML = `<span class="text-danger">${data.message}</span>`;
                if(data.duplicate) {
                    captureBtn.disabled = true; // Stop user from further capturing
                    captureStatus.innerHTML += `<br><small class="text-warning">Please register under the existing correct ID or contact Admin.</small>`;
                }
            }
        }).catch(err => {
            captureBtn.innerHTML = originalText;
            captureBtn.disabled = false;
            captureStatus.innerHTML = `<span class="text-danger">Capture failed: ${err.message}</span>`;
        });
    });

    // Step 3: Train Model
    trainBtn.addEventListener('click', () => {
        captureStatus.innerText = "Finalizing database registration... please wait.";
        trainBtn.disabled = true;
        
        fetch('/api/finalize_registration', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                student_id: currentStudentId,
                name: nameInput.value,
                email: emailInput.value,
                role: roleInput.value,
                password: passwordInput.value,
                class_id: document.getElementById('class_id').value // New
            })
        })
        .then(res => res.json())
        .then(res => {
            if(res.success || res.message.includes("already exists")) {
                // If it already exists, it means Step 1 was successful, so we treat it as success here too
                captureStatus.innerHTML = `<span class="text-success"><i class="fas fa-check-circle"></i> Registration Complete!</span><br><a href="/dashboard" class="btn btn-sm btn-primary mt-2">Go to Dashboard</a>`;
                stopWebcam();
            } else {
                captureStatus.innerHTML = `<span class="text-danger">Error: ${res.message}</span>`;
                trainBtn.disabled = false;
            }
        }).catch(err => {
            captureStatus.innerHTML = `<span class="text-danger">Finalization network error: ${err.message}</span>`;
            trainBtn.disabled = false;
        });
    });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Register New Student</h1>
</div>

<div class="row">
    <!-- Form Box -->
    <div class="col-md-5">
        <div class="card p-4">
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Student ID</label>
                    <input type="text" class="form-control" id="student_id" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                {% if is_admin %}
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="adminOverride">
                    <label class="form-check-label text-warning" for="adminOverride"><i class="fas fa-exclamation-triangle"></i> Admin Override: Skip Webcam (Database Only)</label>
                </div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">1. Save Details</button>
            </form>
            <div id="statusMsg" class="mt-3 text-center"></div>
        </div>
    </div>

    <!-- Webcam Capture Box -->
    <div class="col-md-7">
        <div class="card p-4">
            <h4>Capture Face Dataset</h4>
            <p class="text-muted">Register details first, then capture at least 10 photos.</p>
            <video id="video" width="100%" autoplay style="border-radius: 8px; background: #000;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="mt-3 d-flex justify-content-between">
                <button id="captureBtn" class="btn btn-success" disabled>
                    <i class="fas fa-camera"></i> Capture Face (<span id="count">0</span>/10)
                </button>
                <button id="trainBtn" class="btn btn-danger" disabled>
                    <i class="fas fa-brain"></i> Train AI Model
                </button>
            </div>
            <div id="captureStatus" class="mt-2 text-center text-info"></div>
        </div>
    </div>
</div>

<script>
    const studentIdInput = document.getElementById('student_id');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const registerForm = document.getElementById('registerForm');
    const statusMsg = document.getElementById('statusMsg');
    
    // Video elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const captureBtn = document.getElementById('captureBtn');
    const trainBtn = document.getElementById('trainBtn');
    const countSpan = document.getElementById('count');
    const captureStatus = document.getElementById('captureStatus');

    let currentStudentId = null;
    let captureCount = 0;
    const TARGET_COUNT = 10;

    // Start Webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { console.error("Webcam error:", err); });

    // Step 1: Register
    registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = {
            student_id: studentIdInput.value,
            name: nameInput.value,
            email: emailInput.value
        };

        fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                const adminOverrideCheckbox = document.getElementById('adminOverride');
                const isOverride = adminOverrideCheckbox ? adminOverrideCheckbox.checked : false;
                
                if(isOverride) {
                    statusMsg.innerHTML = `<span class="text-info">Bypassing webcam. Saving to database...</span>`;
                    fetch('/api/finalize_registration', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    }).then(r => r.json()).then(finalRes => {
                        if(finalRes.success) {
                            statusMsg.innerHTML = `<span class="text-success"><i class="fas fa-check-circle"></i> Student successfully registered to Database! (No Photos)</span>`;
                            registerForm.reset();
                        } else {
                            statusMsg.innerHTML = `<span class="text-danger">DB Error: ${finalRes.message}</span>`;
                        }
                    });
                } else {
                    statusMsg.innerHTML = `<span class="text-success">${res.message}</span>`;
                    currentStudentId = data.student_id;
                    captureBtn.disabled = false;
                    
                    studentIdInput.disabled = true;
                    nameInput.disabled = true;
                    emailInput.disabled = true;
                    if (adminOverrideCheckbox) adminOverrideCheckbox.disabled = true;
                    registerForm.querySelector('button[type="submit"]').disabled = true;
                }
            } else {
                statusMsg.innerHTML = `<span class="text-danger">${res.message}</span>`;
            }
        });
    });

    // Step 2: Capture Images
    captureBtn.addEventListener('click', () => {
        if(!currentStudentId) return;
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/jpeg');
        
        fetch('/api/save_image', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                student_id: currentStudentId,
                image: dataURL
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                captureCount++;
                countSpan.innerText = captureCount;
                captureStatus.innerHTML = `<span class="text-success">${data.message}</span>`;
                if(captureCount >= TARGET_COUNT) {
                    trainBtn.disabled = false;
                    captureStatus.innerText = "Sufficient dataset collected. Click Train.";
                }
            } else {
                captureStatus.innerHTML = `<span class="text-danger">${data.message}</span>`;
                if(data.duplicate) {
                    captureBtn.disabled = true; // Stop user from further capturing
                    captureStatus.innerHTML += `<br><small class="text-warning">Please register under the existing correct ID or contact Admin.</small>`;
                }
            }
        });
    });

    // Step 3: Train Model
    trainBtn.addEventListener('click', () => {
        captureStatus.innerText = "Finalizing database registration... please wait.";
        trainBtn.disabled = true;
        
        fetch('/api/finalize_registration', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                student_id: currentStudentId,
                name: nameInput.value,
                email: emailInput.value
            })
        })
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                captureStatus.innerText = "Registration saved! Training AI model...";
                fetch('/api/train', { method: 'POST' })
                .then(trainRes => trainRes.json())
                .then(data => {
                    if(data.success) {
                        captureStatus.innerHTML = `<span class="text-success">Registration fully complete and Model Trained!</span>`;
                    } else {
                        captureStatus.innerHTML = `<span class="text-danger">Training failed: ${data.message}</span>`;
                        trainBtn.disabled = false;
                    }
                });
            } else {
                captureStatus.innerHTML = `<span class="text-danger">Database error: ${res.message}</span>`;
                trainBtn.disabled = false;
            }
        });
    });
</script>
{% endblock %}

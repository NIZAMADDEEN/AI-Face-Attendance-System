{% extends "base.html" %}
{% block title %}Live Face Scanner{% endblock %}

{% block content %}
<div class="row pt-4">
    <div class="col-md-8 mx-auto text-center">
        <h2>Live Attendance Scanner</h2>
        <p class="text-muted">Look into the camera. Ensure you are within the campus premises.</p>
        
        <div class="card p-3 shadow-sm mx-auto" style="max-width: 640px;">
            <div style="position: relative; width: 100%;">
                <video id="videoElement" autoplay playsinline width="100%" style="border-radius: 8px; transform: scaleX(-1);"></video>
                <canvas id="overlayCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
            </div>
            <canvas id="canvasElement" style="display: none;"></canvas>
            
            <div class="mt-3">
                <button id="toggleScanner" class="btn btn-primary btn-lg rounded-pill px-5">Start Scanner</button>
            </div>
            
            <div id="logsBox" class="mt-3 text-start" style="height: 150px; overflow-y: auto; background: #f1f2f6; padding: 10px; border-radius: 8px;">
                <div class="text-muted text-center" style="padding-top: 50px;">Scan logs will appear here</div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const context = canvas.getContext('2d');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const overlayCtx = overlayCanvas.getContext('2d');
    const toggleBtn = document.getElementById('toggleScanner');
    const logsBox = document.getElementById('logsBox');

    let isScanning = false;
    let isProcessingFrame = false;
    let scanInterval;
    let cameraStream = null;
    
    // GPS Configuration (Dynamic from Browser)
    let currentLat = null;
    let currentLon = null;
    let gpsWatchId = null;

    function updateGPSStatus(msg, type='text-muted') {
        let statusEl = document.getElementById('gpsStatus');
        if (!statusEl) {
            statusEl = document.createElement('div');
            statusEl.id = 'gpsStatus';
            statusEl.className = 'small mt-2';
            const btnBox = document.querySelector('.mt-3');
            btnBox.appendChild(statusEl);
        }
        statusEl.innerHTML = `<span class="${type}">${msg}</span>`;
    }

    function startGPS() {
        if (!navigator.geolocation) {
            updateGPSStatus("GPS not supported by your browser", "text-danger");
            return;
        }

        updateGPSStatus("GPS: Acquiring location...", "text-warning");

        gpsWatchId = navigator.geolocation.watchPosition(
            (position) => {
                currentLat = position.coords.latitude;
                currentLon = position.coords.longitude;
                updateGPSStatus(`GPS: Connected (${currentLat.toFixed(4)}, ${currentLon.toFixed(4)})`, "text-success");
            },
            (error) => {
                console.error("GPS Error:", error);
                let errorMsg = "GPS Error";
                if (error.code === 1) errorMsg = "GPS: Permission Denied";
                else if (error.code === 2) errorMsg = "GPS: Unavailable";
                else if (error.code === 3) errorMsg = "GPS: Timeout";
                updateGPSStatus(errorMsg, "text-danger");
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    function stopGPS() {
        if (gpsWatchId) {
            navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = null;
        }
        updateGPSStatus("GPS: Off", "text-muted");
    }

    async function startCamera() {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = cameraStream;
            startGPS();
        } catch (err) {
            console.error("Camera access denied.", err);
            alert("Please allow camera access.");
        }
    }

    function stopCamera() {
        if(cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
        }
        stopGPS();
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    }

    function appendLog(msg, type='info') {
        const div = document.createElement('div');
        div.className = `alert alert-${type} py-1 px-2 m-1`;
        div.style.fontSize = '14px';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logsBox.prepend(div);
    }

    function drawFaceRects(logs, imgWidth, imgHeight) {
        // Clear previous silhouettes
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        
        // Sync canvas resolution with video displayed size
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;

        const scaleX = overlayCanvas.width / imgWidth;
        const scaleY = overlayCanvas.height / imgHeight;

        logs.forEach(log => {
            if (!log.box) return;
            const [top, right, bottom, left] = log.box;
            
            const width = (right - left) * scaleX;
            const height = (bottom - top) * scaleY;
            
            // Mirroring: Video is flipped via CSS scaleX(-1). 
            // The X coordinate needs to be reversed.
            const x = overlayCanvas.width - (left * scaleX) - width;
            const y = top * scaleY;

            // Rectangle styling
            overlayCtx.lineWidth = 3;
            let color = "#dc3545"; // Default Red
            
            if (log.student_id && log.student_id !== "Unknown") {
                if (log.success) {
                    color = "#28a745"; // Green (Present)
                } else if (log.message && log.message.includes("already")) {
                    color = "#17a2b8"; // Blue (Already marked)
                } else {
                    color = "#ffc107"; // Yellow (Recognized but issue)
                }
            }
            
            overlayCtx.strokeStyle = color;
            overlayCtx.strokeRect(x, y, width, height);

            // Label Box
            overlayCtx.fillStyle = color;
            overlayCtx.font = "bold 14px Segoe UI, Arial";
            const nameLabel = log.student_name || "Unknown";
            const confLabel = log.confidence ? `(${(log.confidence*100).toFixed(0)}%)` : "";
            const fullLabel = `${nameLabel} ${confLabel}`;
            
            const textWidth = overlayCtx.measureText(fullLabel).width;
            overlayCtx.fillRect(x, y > 22 ? y - 22 : y + height, textWidth + 10, 22);
            
            overlayCtx.fillStyle = "white";
            overlayCtx.fillText(fullLabel, x + 5, y > 22 ? y - 6 : y + height + 16);
            
            // Sub-label for status message
            if (log.message) {
                overlayCtx.font = "11px Arial";
                overlayCtx.fillStyle = color;
                overlayCtx.fillText(log.message, x, y > 22 ? y - 28 : y + height + 35);
            }
        });
    }

    function scanFrame() {
        if(!isScanning || isProcessingFrame) return;

        if (video.videoWidth === 0 || video.videoHeight === 0) {
            console.warn("Video dimensions not ready yet.");
            return;
        }

        if (currentLat === null || currentLon === null) {
            console.warn("Waiting for GPS coordinates...");
            updateGPSStatus("GPS: Waiting for location...", "text-warning");
            return;
        }

        isProcessingFrame = true;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/jpeg', 0.7); // compress slightly
        
        fetch('/api/recognize', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                image: dataURL,
                lat: currentLat,
                lon: currentLon
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                // Draw rectangles on overlay
                drawFaceRects(data.logs, canvas.width, canvas.height);

                if (data.logs.length > 0) {
                    data.logs.forEach(log => {
                        let name = log.student_name || "Face Detected";
                        let text = `${name} — ${log.message}`;
                        
                        if(log.location_valid === false &&
                           !log.message.includes("Spoof") &&
                           !log.message.includes("looking") &&
                           !log.message.includes("blink")) {
                            text += " ⚠ Location invalid";
                        }
                        
                        appendLog(text, log.success ? 'success' : 'danger');
                    });
                }
                // If no faces detected, silently do nothing (scanner is working fine, just no face in frame)
            } else {
                appendLog(`Server error: ${data.message}`, 'warning');
            }
        }).catch(err => {
            console.error("Scan error:", err);
            appendLog(`Connection error: ${err.message}`, 'warning');
        }).finally(() => {
            isProcessingFrame = false;
        });
    }

    toggleBtn.addEventListener('click', async () => {
        if(isScanning) {
            // Stop
            isScanning = false;
            clearInterval(scanInterval);
            stopCamera();
            toggleBtn.innerText = "Start Scanner";
            toggleBtn.className = "btn btn-primary btn-lg rounded-pill px-5";
            toggleBtn.disabled = false;
        } else {
            // Start
            const originalText = toggleBtn.innerText;
            toggleBtn.innerText = "Initializing...";
            toggleBtn.disabled = true;
            
            await startCamera();
            
            if (cameraStream) {
                logsBox.innerHTML = ''; // clear logs
                isScanning = true;
                toggleBtn.innerText = "Stop Scanner";
                toggleBtn.className = "btn btn-danger btn-lg rounded-pill px-5";
                toggleBtn.disabled = false;
                
                // Send frames frequently but guarded by isProcessingFrame
                scanInterval = setInterval(scanFrame, 800);
            } else {
                toggleBtn.innerText = originalText;
                toggleBtn.disabled = false;
                appendLog("Failed to start camera. Please check permissions.", "danger");
            }
        }
    });
</script>
{% endblock %}
